<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Central vertical spine -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Joint circles -->
  <circle cx="32" cy="10" r="4" fill="#00d4aa" opacity="0.9"/>
  <circle cx="32" cy="28" r="4" fill="#00d4aa" opacity="0.9"/>
  <circle cx="32" cy="46" r="4" fill="#00d4aa" opacity="0.9"/>
  <circle cx="32" cy="54" r="3" fill="#00d4aa" opacity="0.7"/>
  <!-- Left arm bone -->
  <line x1="32" y1="28" x2="14" y2="20" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="14" cy="20" r="3.5" fill="#00d4aa" opacity="0.8"/>
  <line x1="14" y1="20" x2="6" y2="30" stroke="#00d4aa" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="6" cy="30" r="2.5" fill="#00d4aa" opacity="0.6"/>
  <!-- Right arm bone -->
  <line x1="32" y1="28" x2="50" y2="20" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="20" r="3.5" fill="#00d4aa" opacity="0.8"/>
  <line x1="50" y1="20" x2="58" y2="30" stroke="#00d4aa" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="58" cy="30" r="2.5" fill="#00d4aa" opacity="0.6"/>
  <!-- Left leg bone -->
  <line x1="32" y1="46" x2="20" y2="58" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="58" r="3" fill="#00d4aa" opacity="0.7"/>
  <!-- Right leg bone -->
  <line x1="32" y1="46" x2="44" y2="58" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="44" cy="58" r="3" fill="#00d4aa" opacity="0.7"/>
  <!-- Glow effect -->
  <circle cx="32" cy="28" r="8" fill="#00d4aa" opacity="0.08"/>
</svg>
