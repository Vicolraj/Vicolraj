<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Orbit 1 (horizontal) -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="#61dafb" stroke-width="2"/>
  <!-- Orbit 2 (rotated 60deg) -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="#61dafb" stroke-width="2" transform="rotate(60 32 32)"/>
  <!-- Orbit 3 (rotated -60deg) -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="#61dafb" stroke-width="2" transform="rotate(-60 32 32)"/>
  <!-- Center nucleus -->
  <circle cx="32" cy="32" r="4.5" fill="#61dafb"/>
  <!-- Glow -->
  <circle cx="32" cy="32" r="8" fill="#61dafb" opacity="0.12"/>
</svg>
