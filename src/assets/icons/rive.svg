<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rive "R" play-inspired mark -->
  <!-- Background circle -->
  <circle cx="32" cy="32" r="28" fill="rgba(0,212,170,0.08)" stroke="#00d4aa" stroke-width="1.5"/>
  <!-- Stylized R from Rive brand -->
  <path d="M20 16 L20 48" stroke="#00d4aa" stroke-width="4" stroke-linecap="round"/>
  <!-- Top arch of R -->
  <path d="M20 16 Q38 16 38 26 Q38 36 20 36" stroke="#00d4aa" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Diagonal leg of R -->
  <path d="M22 35 L44 48" stroke="#00d4aa" stroke-width="4" stroke-linecap="round"/>
  <!-- Glow dot -->
  <circle cx="32" cy="26" r="4" fill="#00d4aa" opacity="0.3"/>
</svg>
